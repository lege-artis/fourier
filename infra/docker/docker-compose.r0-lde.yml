# R0-LDE — Local Development Environment (unified stack)
# Includes: all 5 KH-sim backends + PlantUML diagram server + Keycloak IdP
# ELK stack deliberately excluded until LOG-001..006 are gated (R0 complete)
#
# USAGE
# ─────
# Start full LDE:   docker compose -f docker-compose.r0-lde.yml up -d
# Stop  full LDE:   docker compose -f docker-compose.r0-lde.yml down
# Build all images: docker compose -f docker-compose.r0-lde.yml build
# Status:           docker compose -f docker-compose.r0-lde.yml ps
#
# Preferred entry point: use Start-LocalEnv.ps1 (project root _config/)
# which wraps this file and adds health-check reporting.
#
# Port map:
#   8001  kh-rust
#   8002  kh-scala
#   8003  kh-cpp
#   8004  kh-fortran
#   8005  kh-pascal
#   8006  kh-log-service  (simulation event recorder + viewer API -- KH-014)
#   8010  plantuml-server
#   8090  keycloak         (OIDC IdP -- vibedev realm; AUTH-002)
#          keycloak-db     (postgres:15-alpine backend for keycloak; no host port)

x-backend-defaults: &backend-defaults
  restart: unless-stopped
  networks:
    - kh-sim-net

services:

  # ── KH-Sim backends ──────────────────────────────────────────────────────
  kh-rust:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/backends/rust
      dockerfile: Dockerfile
    image: kh-sim-rust:latest
    container_name: kh-sim-rust
    ports:
      - "8001:8001"
    environment:
      RUST_LOG: "info"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  kh-scala:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/backends/scala
      dockerfile: Dockerfile
    image: kh-sim-scala:latest
    container_name: kh-sim-scala
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  kh-cpp:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/backends/cpp
      dockerfile: Dockerfile
    image: kh-sim-cpp:latest
    container_name: kh-sim-cpp
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  kh-fortran:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/backends/fortran
      dockerfile: Dockerfile
    image: kh-sim-fortran:latest
    container_name: kh-sim-fortran
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8004/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  kh-pascal:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/backends/pascal
      dockerfile: Dockerfile
    image: kh-sim-pascal:latest
    container_name: kh-sim-pascal
    ports:
      - "8005:8005"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8005/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Log service ──────────────────────────────────────────────────────────
  kh-log-service:
    <<: *backend-defaults
    build:
      context: ../../kh-sim/log-service
      dockerfile: Dockerfile
    image: kh-sim-log-service:latest
    container_name: kh-sim-log-service
    ports:
      - "8006:8006"
    environment:
      PORT:       "8006"
      MONGO_URI:  "mongodb://host.docker.internal:27017"
      MONGO_DB:   "vibedev"
      MONGO_COLL: "logs"
      LOG_LEVEL:  "info"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8006/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 8s

  # ── Diagram tooling ──────────────────────────────────────────────────────
  plantuml-server:
    <<: *backend-defaults
    image: plantuml/plantuml-server:jetty
    container_name: plantuml-server
    ports:
      - "8010:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Keycloak OIDC IdP (AUTH-002) ──────────────────────────────────────────
  # PostgreSQL backing store for Keycloak -- no host port (internal only)
  keycloak-db:
    <<: *backend-defaults
    image: postgres:15-alpine
    container_name: keycloak-db
    environment:
      POSTGRES_DB:       keycloak
      POSTGRES_USER:     keycloak
      POSTGRES_PASSWORD: "${KC_DB_PASSWORD:-keycloak_dev}"
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Keycloak 24.0 -- realm: vibedev -- host port :8090
  # Admin UI:     http://localhost:8090  (admin / ${KC_ADMIN_PASSWORD:-admin_dev})
  # Discovery:    http://localhost:8090/realms/vibedev/.well-known/openid-configuration
  # start-dev mode; PostgreSQL backend (persistent across container restarts)
  # JVM startup: ~30-60 s cold; health poll uses start_period: 60s + 8 retries
  keycloak:
    <<: *backend-defaults
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN:          admin
      KEYCLOAK_ADMIN_PASSWORD: "${KC_ADMIN_PASSWORD:-admin_dev}"
      KC_DB:                   postgres
      KC_DB_URL:               jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME:          keycloak
      KC_DB_PASSWORD:          "${KC_DB_PASSWORD:-keycloak_dev}"
      KC_HTTP_PORT:            "8090"
    ports:
      - "8090:8090"
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

networks:
  kh-sim-net:
    name: kh-sim-net
    driver: bridge

volumes:
  keycloak-db-data:
    name: kh-sim-keycloak-db-data
