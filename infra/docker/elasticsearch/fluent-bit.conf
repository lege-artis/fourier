# Fluent Bit main configuration -- VibeCodeProjects log pipeline
# Architecture: infra/LOG-ARCHITECTURE.md
# Task scope:
#   LOG-001: HTTP server + TCP input + ES output (this file -- minimal, valid)
#   LOG-002: routing filters + per-index output rules (extend this file)
#   LOG-004: KH-sim backend structured JSON emission to port 24224
#
# NOTE (Fluent Bit 3.x rule): [PARSER] sections are NOT valid in this file.
# Custom parsers must go in a separate parsers.conf referenced via Parsers_File.
# The postgresql_slow parser needed for file-tail inputs (LOG-002) belongs there.
#
# ACTIVE inputs: TCP 24224 (JSON)
# DISABLED inputs: file-tail for PG + Mongo logs (require host volume mounts,
#   configured in LOG-002 when host paths are confirmed)

[SERVICE]
    Flush             5
    Daemon            Off
    Log_Level         info
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

# ── INPUT -- TCP JSON (LOG-001) ───────────────────────────────────────────────
# Accepts structured JSON log events from:
#   - KH-sim backends (LOG-004 will wire these)
#   - GitHub Actions CI connector (log-connector-github-actions)
#   - Any service that can POST JSON to host:24224
[INPUT]
    Name              tcp
    Listen            0.0.0.0
    Port              24224
    Format            json
    Tag               kh.sim
    Chunk_Size        32
    Buffer_Size       64

# ── OUTPUT -- Elasticsearch (LOG-001) ─────────────────────────────────────────
# All events -> kh-sim-{YYYY.MM.DD} index for now.
# LOG-002 will split into ci-logs-*, test-results-*, db-slow-*, kh-sim-*
# using rewrite_tag filters + per-match output blocks.
[OUTPUT]
    Name              es
    Match             *
    Host              elasticsearch
    Port              9200
    Logstash_Format   On
    Logstash_Prefix   kh-sim
    Logstash_DateFormat %Y.%m.%d
    Type              _doc
    Suppress_Type_Name On
    Retry_Limit       5
