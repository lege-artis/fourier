server {
    listen 8080;
    server_name kh-rust.test;

    # Reverse proxy to Rust axum backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # React F/E — served by Laragon or npm dev server (port 3000 during dev)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Health endpoint passthrough
    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
    }

    access_log  D:/Apps/Laragon/logs/kh-rust-access.log;
    error_log   D:/Apps/Laragon/logs/kh-rust-error.log warn;
}
