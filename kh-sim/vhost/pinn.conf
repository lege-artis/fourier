server {
    listen 8080;
    server_name pinn.test;

    # PINN FastAPI service (port 8600)
    location / {
        proxy_pass         http://127.0.0.1:8600;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;   # training runs can take minutes
    }

    # Long-poll for /v1/pinn/results/{id}
    location ~ ^/v1/pinn/results/ {
        proxy_pass         http://127.0.0.1:8600;
        proxy_http_version 1.1;
        proxy_read_timeout 600s;
        proxy_buffering    off;
    }

    access_log  D:/Apps/Laragon/logs/pinn-access.log;
    error_log   D:/Apps/Laragon/logs/pinn-error.log warn;
}
