server {
    listen 8080;
    server_name kh-scala.test;

    # Reverse proxy to Scala backend (http4s, port 8002)
    location /api/ {
        proxy_pass         http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8002/health;
    }

    access_log  D:/Apps/Laragon/logs/kh-scala-access.log;
    error_log   D:/Apps/Laragon/logs/kh-scala-error.log warn;
}
