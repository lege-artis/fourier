server {
    listen 8080;
    server_name kh-log.test;

    # Reverse proxy to log service (Node.js/Express)
    location / {
        proxy_pass         http://127.0.0.1:8006;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Health endpoint passthrough
    location = /health {
        proxy_pass http://127.0.0.1:8006/health;
    }

    # Simulation event recorder
    location = /event {
        proxy_pass         http://127.0.0.1:8006/event;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Log viewer API
    location /viewer {
        proxy_pass         http://127.0.0.1:8006/viewer;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Per-backend aggregate summary
    location /summary {
        proxy_pass         http://127.0.0.1:8006/summary;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    access_log  D:/Apps/Laragon/logs/kh-log-access.log;
    error_log   D:/Apps/Laragon/logs/kh-log-error.log warn;
}
