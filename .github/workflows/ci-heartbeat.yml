name: CI Heartbeat
on:
  push:
    branches: [ main, develop, macbook, thinkpad ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:         # Allow manual trigger via gh CLI or GitHub UI

jobs:
  # ── Task integrity check ─────────────────────────────────────────────────────
  task-integrity-check:
    name: Task Registry Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test dependencies
        run: pip install pyyaml pytest
      - name: Run task integrity checks
        run: pytest _tests/test_task_integrity.py -v --tb=short
      - name: Upload integrity report
        if: always()
        continue-on-error: true          # artifact upload can time out in act/restricted envs
        uses: actions/upload-artifact@v4
        with:
          name: task-integrity-report
          path: .pytest_cache/

  # ── C++ ──────────────────────────────────────────────────────────────────────
  cpp-build-test:
    name: C++ Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++
      - name: Compile C++ hello world
        run: |
          cd "platform sources/C++"
          g++ -o hello_test hello_test.cpp
      - name: Run C++ hello world
        run: |
          cd "platform sources/C++"
          ./hello_test
      - name: Report status
        if: success()
        run: echo "C++ build and test passed"

  # ── Rust ─────────────────────────────────────────────────────────────────────
  rust-build-test:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust project
        run: |
          cd "platform sources/Rust/hello_test"
          cargo build --release
      - name: Run Rust tests
        run: |
          cd "platform sources/Rust/hello_test"
          cargo test
      - name: Report status
        if: success()
        run: echo "Rust build and test passed"

  # ── Scala ────────────────────────────────────────────────────────────────────
  scala-build-test:
    name: Scala Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install SBT
        uses: sbt/setup-sbt@v1         # official sbt action — works on all ubuntu-latest versions
      - name: Build and test Scala
        run: |
          cd "platform sources/Scala"
          sbt clean compile test
      - name: Report status
        if: success()
        run: echo "Scala build and test passed"

  # ── Pascal ───────────────────────────────────────────────────────────────────
  pascal-build-test:
    name: Pascal Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Free Pascal
        run: |
          sudo apt-get update
          sudo apt-get install -y fpc
      - name: Compile Pascal hello world
        run: |
          cd "platform sources/Pascal"
          fpc hello_test.pas          # -o flag omitted: breaks on some fpc versions; default output name matches source
      - name: Run Pascal hello world
        run: |
          cd "platform sources/Pascal"
          ./hello_test
      - name: Report status
        if: success()
        run: echo "Pascal build and test passed"

  # ── Fortran ──────────────────────────────────────────────────────────────────
  fortran-build-test:
    name: Fortran Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GFortran
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran
      - name: Compile Fortran hello world
        run: |
          cd "platform sources/Fortran"
          gfortran -o hello_test hello_test.f90
      - name: Run Fortran hello world
        run: |
          cd "platform sources/Fortran"
          ./hello_test
      - name: Report status
        if: success()
        run: echo "Fortran build and test passed"

  # ── React ────────────────────────────────────────────────────────────────────
  react-test:
    name: React Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install dependencies
        run: |
          cd "platform sources/React"
          npm install
      - name: Run React tests
        run: |
          cd "platform sources/React"
          npm test -- --watchAll=false --passWithNoTests
      - name: Build React app
        run: |
          cd "platform sources/React"
          npm run build
        env:
          CI: false                   # prevents ESLint warnings from failing the build
      - name: Report status
        if: success()
        run: echo "React build and test passed"

  # ── Database ─────────────────────────────────────────────────────────────────
  db-connectivity-test:
    name: Database Connectivity Test
    runs-on: ubuntu-latest
    continue-on-error: true           # GEN-009/GEN-010 pending: secrets + DB instances not yet provisioned
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Test database connection
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          psql -h localhost -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -c "SELECT version();"
      - name: Report status
        if: success()
        run: echo "Database connectivity test passed"

  # ── Browser: Chrome (Windows) ─────────────────────────────────────────────
  browser-chrome-test:
    name: Browser Test — Chrome (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Playwright + Chrome
        run: |
          cd "platform sources/React"
          npm install
          npx playwright install chromium --with-deps
      - name: Run Playwright tests — Chrome
        run: |
          cd "platform sources/React"
          npx playwright test --project=chromium
        env:
          PWDEBUG: 0
      - name: Upload Playwright report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-chrome-report
          path: "platform sources/React/playwright-report/"

  # ── Browser: Firefox (crosscheck) ────────────────────────────────────────
  browser-firefox-test:
    name: Browser Crosscheck — Firefox
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install Playwright + Firefox
        run: |
          cd "platform sources/React"
          npm install
          npm install --save-dev @playwright/test   # ensure @playwright/test module is available
          npx playwright install firefox --with-deps
      - name: Run Playwright tests — Firefox (crosscheck)
        run: |
          cd "platform sources/React"
          npx playwright test --project=firefox
        env:
          PWDEBUG: 0
      - name: Upload Firefox crosscheck report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: playwright-firefox-report
          path: "platform sources/React/playwright-report/"

  # ── Log infrastructure (LOG-005) ─────────────────────────────────────────────
  log-infra-test:
    name: Log Infrastructure Test
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx1g"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - name: Record job start time
        id: timer
        run: echo "start=$(date +%s%3N)" >> "$GITHUB_OUTPUT"

      - name: Wait for Elasticsearch ready
        run: |
          echo "Waiting for ES cluster health..."
          timeout 90 bash -c 'until curl -sf http://localhost:9200/_cluster/health; do sleep 3; done'
          echo "ES ready."

      - name: Compute elapsed time (start → ES ready)
        id: duration
        run: |
          END=$(date +%s%3N)
          echo "ms=$(( END - ${{ steps.timer.outputs.start }} ))" >> "$GITHUB_OUTPUT"

      - name: Ship test event via log-connector-github-actions
        uses: ./infra/connectors/log-connector-github-actions
        with:
          es_host:     http://localhost:9200
          suite:       log-infra-test
          status:      pass
          duration_ms: ${{ steps.duration.outputs.ms }}

      - name: Verify ES ingestion — doc count > 0
        run: |
          sleep 2
          TODAY=$(date -u +%Y.%m.%d)
          INDEX="test-results-${TODAY}"
          RESPONSE=$(curl -sf "http://localhost:9200/${INDEX}/_count" || echo '{"count":0}')
          COUNT=$(echo "${RESPONSE}" | python3 -c "import sys,json; print(json.load(sys.stdin)['count'])")
          echo "[log-infra-test] ${INDEX} doc count: ${COUNT}"
          if [ "${COUNT}" -gt 0 ]; then
            echo "ES ingestion verified: ${COUNT} docs in ${INDEX}"
          else
            echo "::error::ES ingestion failed: 0 docs found in ${INDEX}"
            exit 1
          fi

      - name: Report status
        if: success()
        run: echo "Log infrastructure test passed -- ES ingestion pipeline operational"

  # ── Summary ───────────────────────────────────────────────────────────────────
  summary-notification:
    name: CI Summary
    needs: [task-integrity-check, cpp-build-test, rust-build-test, scala-build-test, pascal-build-test, fortran-build-test, react-test, db-connectivity-test, browser-chrome-test, browser-firefox-test, log-infra-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check job status
        run: |
          echo "=== CI Heartbeat Summary ==="
          echo "Task Integrity:        ${{ needs.task-integrity-check.result }}"
          echo "C++ Build:             ${{ needs.cpp-build-test.result }}"
          echo "Rust Build:            ${{ needs.rust-build-test.result }}"
          echo "Scala Build:           ${{ needs.scala-build-test.result }}"
          echo "Pascal Build:          ${{ needs.pascal-build-test.result }}"
          echo "Fortran Build:         ${{ needs.fortran-build-test.result }}"
          echo "React Tests:           ${{ needs.react-test.result }}"
          echo "Database Connectivity: ${{ needs.db-connectivity-test.result }}"
          echo "Browser Chrome:        ${{ needs.browser-chrome-test.result }}"
          echo "Browser Firefox:       ${{ needs.browser-firefox-test.result }}"
          echo "Log Infrastructure:    ${{ needs.log-infra-test.result }}"
          echo "=============================="
      - name: Notify on failure
        if: |
          needs.task-integrity-check.result == 'failure' ||
          needs.cpp-build-test.result == 'failure' ||
          needs.rust-build-test.result == 'failure' ||
          needs.scala-build-test.result == 'failure' ||
          needs.pascal-build-test.result == 'failure' ||
          needs.fortran-build-test.result == 'failure' ||
          needs.react-test.result == 'failure' ||
          needs.browser-chrome-test.result == 'failure' ||
          needs.browser-firefox-test.result == 'failure' ||
          needs.log-infra-test.result == 'failure'
        run: |
          echo "::warning::One or more CI checks failed. Review logs for details."
          exit 1
      - name: Notify on success
        if: |
          needs.task-integrity-check.result == 'success' &&
          needs.cpp-build-test.result == 'success' &&
          needs.rust-build-test.result == 'success' &&
          needs.scala-build-test.result == 'success' &&
          needs.pascal-build-test.result == 'success' &&
          needs.fortran-build-test.result == 'success' &&
          needs.react-test.result == 'success' &&
          needs.browser-chrome-test.result == 'success' &&
          needs.browser-firefox-test.result == 'success' &&
          needs.log-infra-test.result == 'success'
        run: echo "All required CI checks passed successfully!"