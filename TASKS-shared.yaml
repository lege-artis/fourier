          Minimal R3 scope: read-only import is sufficient; write-back can be manual trigger.
          Acceptance: MI-M-T UI shows JIRA issues as importable test targets.

      - id: MI-M-T-D04
        title: "MI-M-T — Postman interface (import collections as test specs)"
        priority: P2-high
        device: MacBook
        status: pending
        depends_on: [MI-M-T-D02]
        tags: [mi-m-t, postman, integration, R3]
        notes: |
          Import Postman Collection v2.1 JSON into MI-M-T as executable test specs:
            - Parse requests, assertions, pre/post scripts from collection JSON
            - Map Postman test assertions to MI-M-T pass/fail criteria
            - Execute via Newman CLI or Postman API; capture results in MI-M-T
          Minimal R3 scope: collection import + display in MI-M-T UI.
          Newman execution and result capture can be partial for initial release.
          Auth: Postman API key (cloud) or local .json file upload.
          Acceptance: imported collection visible in MI-M-T with full request list.

