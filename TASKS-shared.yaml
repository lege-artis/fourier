  # ══════════════════════════════════════════════════════════════════════════
  # PROJECT: symb-infra
  # Tri-layer symbolic / reasoning / log-data architecture
  #
  # Layer 1 — Physics symbolic (Julia):
  #   Expression simplification, automatic differentiation of PDE terms,
  #   symbolic constraint checking, model parameter inference.
  #   Stack: Julia + Symbolics.jl + ModelingToolkit.jl + DifferentialEquations.jl
  #
  # Layer 2 — Reasoning / inference (Clojure + core.logic):
  #   System state inference, architectural decision logic, constraint propagation.
  #   Stack: Clojure (JVM, interops with Scala), core.logic (miniKanren),
  #          Datahike (Datalog over persistent immutable DB).
  #
  # Layer 3 — Log data substrate (Datalog projection over ELK):
  #   ELK stack (LOG-001–006) remains raw event store.
  #   A Datalog query layer provides a logic-programming-compatible view over
  #   structured log events — same layer as reasoning queries (Layer 2).
  #   This eliminates the impedance mismatch between inference and data retrieval.
  #
  # Key architectural decision: Datalog as the pivot point.
  #   Clojure + core.logic + Datahike gives logic programming AND structured log
  #   queries in a single runtime, with JVM interop to existing Scala backends.
  #   Julia stays orthogonal — pure physics/math domain only.
  # ══════════════════════════════════════════════════════════════════════════
  symb-infra:
    description: "Tri-layer symbolic/reasoning/log-data architecture — Julia (physics symbolic), Clojure+core.logic+Datahike (reasoning+Datalog), ELK bridge"
    decision_confirmed: 2026-03-28
    decision_rationale: |
      Architecture confirmed. Datalog is the pivot point: serves as both query language
      and logic programming substrate, eliminating impedance mismatch between ES log retrieval
      and Clojure/core.logic inference. ELK remains raw event store with a Datahike projection
      layer above it. Julia orthogonal (physics symbolic only). Scope: deeper architectural
      analysis, documentation, and test case creation per SYMB-001 ADR.
    tasks:

      - id: SYMB-001
        title: "Architecture decision record — tri-layer symbolic/reasoning/data design"
        priority: P2-high
        device: both
        status: done
        tags: [architecture, adr, julia, clojure, datalog, symbolic, reasoning]
        notes: |
          Done 2026-04-04. ADR written: infra/SYMB-ARCHITECTURE.md (v1.0.0)
          Five decisions recorded:
            1. Julia as physics symbolic layer boundary (Symbolics.jl, ModelingToolkit.jl,
               AD of PDE residuals; Python/PINN retains numerical execution).
            2. Clojure as reasoning layer: core.logic (miniKanren) for inference rules,
               Datahike (Datalog) for structured queries; JVM alongside Scala.
            3. Log data bridge: ELK raw events → Datahike ETL projection → Datalog query
               interface. Datalog as pivot point for unified L2 query vocabulary.
            4. Inter-layer contracts: Julia REST sidecar (port 8601) ↔ Python; direct JVM
               interop for Clojure ↔ Scala; REST for Julia ↔ Clojure. Contract tests spec'd.
            5. Port allocation: Julia symb 8601, Clojure reasoning 8700, ETL bridge 8701.
          Gate: SYMB-002 through SYMB-005 now unblocked.

      - id: SYMB-002
        title: "Julia symbolic physics layer — prototype (Symbolics.jl + ModelingToolkit.jl)"
        priority: P2-high
        device: MacBook
        status: deferred
        depends_on: [SYMB-001]
        tags: [julia, symbolic, physics, pde, ad, symbolics-jl]
        notes: |
          Scope (per SYMB-001 ADR):
            - Symbolic representation of KH vorticity equation (omega_t + u*omega_x + v*omega_y = nu*laplacian(omega))
            - Automatic differentiation of PDE residual terms (via ModelingToolkit symbolic AD)
            - Expression simplification and dimensional consistency checks
            - REST sidecar (HTTP.jl, port TBD from SYMB-001) exposing symbolic query endpoints
          Acceptance: can return symbolic Jacobian of vorticity RHS w.r.t. Re, verified against finite-difference approximation.

      - id: SYMB-003
        title: "Clojure reasoning layer — core.logic inference + Datahike Datalog scaffold"
        priority: P2-high
        device: both
        status: deferred
        depends_on: [SYMB-001]
        tags: [clojure, core-logic, datalog, datahike, reasoning, inference, jvm]
        notes: |
          Scope (per SYMB-001 ADR):
            - Clojure project (deps.edn), core.logic rules for system state inference
              (e.g. "backend X is healthy if last N log events show no error and latency < threshold")
            - Datahike schema: entity-attribute-value model for backend state, simulation runs,
              validation results
            - Datalog queries over Datahike DB: unify with core.logic for hybrid logical queries
            - JVM interop test: call Clojure namespace from Scala (or via HTTP)
          Acceptance: core.logic query over Datahike correctly infers backend health state from
          injected test events, returns well-formed edn/JSON.

      - id: SYMB-004
        title: "Log data bridge — ELK → Datahike ETL projection layer"
        priority: P2-high
        device: ThinkPad
        status: deferred
        depends_on: [SYMB-003, LOG-001]
        tags: [elasticsearch, datahike, datalog, etl, log-bridge, clojure]
        notes: |
          Scope:
            - Clojure ETL pipeline: poll/stream ES index (LOG-001 stack) → transact into Datahike
            - Entity model: map ES log documents to Datahike EAV facts
              (backend-id, timestamp, level, latency-ms, endpoint, status-code, ...)
            - Incremental sync: track last-indexed timestamp, avoid full re-index on restart
            - Datalog query examples: "all backends with p99 latency > 200ms in last 1h",
              "simulation runs where div_rms degraded between steps"
          Acceptance: live Datalog query over real ELK log data returns correct results
          verified against direct ES query.

      - id: SYMB-005
        title: "Inter-layer integration test — Julia symbolic result consumed by Clojure reasoning"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [SYMB-002, SYMB-003]
        tags: [integration, julia, clojure, symbolic, reasoning, contract-test]
        notes: |
          Scope:
            - Julia sidecar REST endpoint returns symbolic Jacobian or constraint violation flag
            - Clojure reasoning layer queries Julia endpoint, asserts over result via core.logic rule
            - Example rule: "simulation is physically consistent if symbolic divergence constraint
              is satisfied AND measured div_rms < threshold"
          This test validates the Layer 1 ↔ Layer 2 contract defined in SYMB-001 ADR.

# ─────────────────────────────────────────────────────────────────────────────
# PROJECT: gr-testcases — GR exact-solution normative test suite
# Source:  Podolský & Griffiths, "Exact Space-Times in Einstein's General
#          Relativity", Cambridge University Press 2009, ISBN 978-0-521-88927-8
# Purpose: Normative test cases for the nonlinear physics framework.
#          The book provides a canonical catalogue of exact GR solutions with
#          known analytical properties — ideal ground truth for verifying that
#          symbolic/numerical layers produce physically correct results.
# Relation to framework:
#   - Layer 1 (Julia/Symbolics.jl): symbolic derivation of metric, Christoffel
#     symbols, Riemann/Ricci/Weyl tensors; comparison against book results
#   - Layer 2 (Clojure reasoning): Datalog rules asserting e.g.
#     "vacuum solution ⟹ Ricci = 0", "Petrov type-D ⟹ specific Weyl structure"
#   - KH-VAL boilerplate milestone: when the validation harness is generalised,
#     GR exact solutions become the first non-fluid physics test family
# decision_confirmed: 2026-03-28
# ─────────────────────────────────────────────────────────────────────────────

  gr-testcases:
    description: >-
      Normative GR exact-solution test cases drawn from Podolský & Griffiths
      (Cambridge 2009). Each task corresponds to a solution family from the book
      and specifies what the symbolic layer must derive and what the reasoning
      layer must assert.
    tasks:
      - id: GR-001
        title: "ADR — GR test-case framework: scope, solution families, acceptance criteria"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [SYMB-001]
        tags: [gr, architecture, adr, physics-framework]
        notes: |
          Write the Architecture Decision Record that answers:
            1. Which solution families from Podolský & Griffiths are in scope for
               the first milestone (suggested: Minkowski, Schwarzschild,
               Reissner-Nordström, pp-waves, Kerr — Chapters 3/9/12/17/13).
            2. What the Julia symbolic layer must produce for each (metric tensor,
               Christoffel symbols Γ^μ_νρ, Ricci scalar R, Weyl tensor Cμνρσ,
               Petrov classification).
            3. Acceptance tolerance: symbolic results are exact (no floating-point
               error), so the test is Boolean (derived == book expression).
            4. How Clojure reasoning rules encode physical constraints
               (vacuum ⟹ Rμν=0, Petrov type D ⟹ Ψ0=Ψ1=Ψ3=Ψ4=0, etc.).
            5. Integration with KH-VAL boilerplate milestone.
          Reference: P&G ISBN 978-0-521-88927-8, front-matter PDF available at
          https://assets.cambridge.org/97805218/89278/frontmatter/9780521889278_frontmatter.pdf

      - id: GR-002
        title: "GR test case — Minkowski space (P&G §3): symbolic baseline"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [GR-001]
        tags: [gr, minkowski, symbolic, julia, baseline]
        notes: |
          Simplest possible GR solution — flat spacetime.
          Julia must derive: gμν = diag(-1,1,1,1), Γ^μ_νρ = 0 everywhere,
          Rμνρσ = 0, R = 0, Weyl = 0, Petrov type O.
          Serves as the smoke test / "hello world" for the GR symbolic pipeline.

      - id: GR-003
        title: "GR test case — Schwarzschild vacuum (P&G §9): symbolic + Petrov type D"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [GR-001]
        tags: [gr, schwarzschild, vacuum, symbolic, julia, petrov]
        notes: |
          Static spherically symmetric vacuum solution. Canonical test for:
            - Symbolic derivation of Schwarzschild metric in Schwarzschild coords
            - Verification Rμν = 0 (vacuum Einstein equations)
            - Weyl tensor non-zero; Petrov type D (Ψ0=Ψ1=Ψ3=Ψ4=0, Ψ2≠0)
            - Clojure rule: "Schwarzschild ∧ outside_horizon ⟹ vacuum ∧ type_D"

      - id: GR-004
        title: "GR test case — pp-waves (P&G §17): symbolic + Petrov type N"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [GR-001]
        tags: [gr, pp-waves, gravitational-waves, symbolic, petrov]
        notes: |
          Plane-fronted gravitational waves — relevant to GW physics.
          Petrov type N (Ψ0=Ψ1=Ψ2=Ψ3=0, Ψ4≠0).
          Tests the symbolic layer's ability to handle null coordinates and
          cross-validates with the reasoning layer's Petrov-type classification rules.

      - id: GR-005
        title: "GR test case — Kerr rotating black hole (P&G §13): symbolic + Boyer-Lindquist"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [GR-003]
        tags: [gr, kerr, rotating, symbolic, julia, petrov]
        notes: |
          Rotating vacuum solution. More complex Christoffel computation.
          Julia derives metric in Boyer-Lindquist coords, verifies Rμν=0,
          Petrov type D. Clojure asserts Kerr reduces to Schwarzschild when a→0.
          This is the capstone GR test case for the first milestone.


# ══════════════════════════════════════════════════════════════════════
# PROJECT: housekeeping
# Recurring session-management procedures (ThinkPad).
# These are procedural gates, not one-time deliverables.
# Status "open" = not yet run this session; "done" = confirmed this session.
# Reset status to "open" at each new session start via merge-tasks.py or manually.
