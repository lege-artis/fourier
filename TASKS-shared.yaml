    - id: Z-15
      title: Podcast episode single — featured image oversized + wrong layout position
      priority: P1-critical
      device: MacBook
      status: open
      tags:
      - bug
      - podcast
      - template
      - css
      - zemla
      traces_to: ADR-02 (layout structural rules), RELEASE-TESTS.md §0
      notes: "BUG REPORT Z-15 — Logged: 2026-04-12\nObserved: zemla.org single podcast_episode page (v1.6.6 LIVE)\n\nSYMPTOM:\n\
        Featured image rendered as a large (~340×340px) grey block in full-column\nflow between the title and the audio player.\
        \ No cover art sizing. No\npositional treatment (float, aside, inline-with-header). Acts as a hero\nimage on a page\
        \ where it should be a compact cover thumbnail.\n\nROOT CAUSE HYPOTHESES (to validate):\nH1 [HIGH] — single-podcast_episode.php\
        \ (or single.php fallback) calls\n    the_post_thumbnail() or the_post_thumbnail('full') with no size argument\n \
        \   or uses 'full' size. No CSS max-width constraint on .podcast-cover\n    or equivalent selector.\nH2 [HIGH] — No\
        \ dedicated podcast cover image size registered via\n    add_image_size('podcast-cover', 200, 200, true). Falls through\
        \ to\n    WordPress default thumbnail which is either 150×150 or 'full'.\nH3 [MEDIUM] — No <figure class=\"podcast-cover\"\
        > wrapper with constrained\n    CSS. Image inherits content-width from .entry-content.\n\nCORRECT BEHAVIOUR:\nCover\
        \ art should display at ≤ 200×200px, positioned either:\n  a) floated right alongside episode title/meta block, or\n\
        \  b) in a dedicated .podcast-header aside, left of title (podcast convention)\nRemainder of entry-content flows below\
        \ the header block.\n\nINVESTIGATION STEPS:\n1. Inspect single-podcast_episode.php (or single.php + template-parts/)\n\
        \   for the_post_thumbnail call — note size argument.\n2. Check functions.php for add_image_size('podcast-cover',\
        \ ...) — if absent → H2.\n3. Inspect computed CSS on .post-thumbnail or .wp-post-image in DevTools.\n4. Check if .gallery-layout\
        \ pattern (ADR-02) was accidentally applied to podcast.\n\nFIX PLAN:\n1. Register 'podcast-cover' size: add_image_size('podcast-cover',\
        \ 200, 200, true).\n2. In single-podcast_episode.php: the_post_thumbnail('podcast-cover').\n3. Wrap in <figure class=\"\
        podcast-cover-art\"> with CSS:\n     .podcast-cover-art { float: right; max-width: 200px; margin: 0 0 1rem 1.5rem;\
        \ }\n4. Run RELEASE-TESTS.md §0 CF-* before packaging.\nSCOPE: zemla only (mim2000/bodyterapie have no podcast post\
        \ type yet).\nRELEASE TARGET: v1.6.7 (batch with CONT-02/CONT-03 if feasible).\n"
    - id: Z-16
      title: Podcast episode single — missing custom player UI (speed, skip, metadata)
      priority: P1-critical
      device: MacBook
      status: open
      depends_on: []
      tags:
      - bug
      - podcast
      - player
      - ui
      - ux
      - zemla
      traces_to: MANIFESTO-suche-kosti-pilot.md §3 C-5 (publish target), POD-MIM-01
      notes: "BUG REPORT Z-16 — Logged: 2026-04-12\nObserved: zemla.org single podcast_episode page (v1.6.6 LIVE)\n\nSYMPTOM:\n\
        Audio player renders as the raw native HTML5 <audio controls> element.\nVisible elements: play button, time counter\
        \ (0:00), download icon.\nMISSING:\n  - Playback speed control (1×/1.5×/2×) — critical for podcast UX\n  - Skip forward/back\
        \ 15s or 30s buttons\n  - Episode number + series/season display\n  - Category/topic tags (e.g. \"Buddhadharma\",\
        \ \"Zen\")\n  - Waveform or progress bar with chapter markers\n  - Human-readable duration at rest (shows 0:00 before\
        \ play, should show 48:28)\n  - Accessible aria-labels\n\nROOT CAUSE:\nThe podcast_episode post type likely stores\
        \ audio via a custom ACF/meta field\n(_podcast_audio_url or similar) and the single template renders it with a\nbare\
        \ wp_audio_shortcode() or <audio src=\"...\"> tag. No custom player wrapper.\nWordPress native player has no speed\
        \ control.\n\nCORRECT BEHAVIOUR:\nTwo implementation options:\n  A. Lightweight custom player (preferred for brand\
        \ control):\n     - HTML5 <audio> wrapped in <div class=\"podcast-player\">\n     - JS-controlled playback speed button\
        \ cycling 1→1.5→2→1\n     - Skip ±30s via seekBy() on the audio element\n     - CSS-styled progress bar using timeupdate\
        \ event\n     - Episode meta block: number, duration, date, tags\n  B. Mediaelement.js (already bundled in WordPress):\n\
        \     - wp_enqueue_script('wp-mediaelement')\n     - Apply [audio] shortcode via do_shortcode() — triggers WP's player\n\
        \     - Gives some controls but not speed; requires override for speed button\n\nRECOMMENDATION: Option A — custom\
        \ .podcast-player component in the theme.\nKeeps it brand-aligned, avoids plugin dependency, reusable for mim2000/bodyterapie.\n\
        \nINVESTIGATION STEPS:\n1. Locate audio URL storage: grep '_podcast_audio\\|podcast_url\\|audio_file'\n   in functions.php\
        \ and single-podcast_episode.php.\n2. Check if WP Mediaelement.js is already enqueued on podcast pages.\n3. Confirm\
        \ current render method (bare <audio> vs. wp_audio_shortcode).\n\nFIX PLAN:\n1. Create template-parts/podcast-player.php:\n\
        \     <div class=\"podcast-player\" data-src=\"<?= esc_url($audio_url) ?>\">\n       <audio preload=\"metadata\" src=\"\
        <?= esc_url($audio_url) ?>\"></audio>\n       <!-- speed, skip, progress controls -->\n     </div>\n2. Create podcast-player.js:\
        \ speed cycling, skip, progress, aria.\n3. Create podcast-player.css: consistent with zemla design tokens.\n4. Enqueue\
        \ via functions.php is_singular('podcast_episode') conditional.\n5. Render episode meta block: number, series, date,\
        \ duration, tags.\nSCOPE: zemla v1 → mim2000/bodyterapie when their podcast CPTs are added (PIL-08+).\nRELEASE TARGET:\
        \ v1.6.8 (separate from Z-15; more work; own release slot).\nDEPENDENCY: Resolving Z-15 first is not required but\
        \ logical to bundle Z-15+Z-16\ninto a single podcast template improvement session.\n"
