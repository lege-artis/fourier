        \ -Stack all -UpdateHandoff\nChecks:\n  LDE stack  : kh-rust(:8001) kh-scala(:8002) kh-cpp(:8003)\n              \
        \ kh-fortran(:8004) kh-pascal(:8005) plantuml(:8010)\n  ELK stack  : elasticsearch(:9200) kibana(:5601) fluent-bit(:2020)\n\
        \  MongoDB    : Windows service + TCP :27017\n  Git state  : active branch != main, remote origin reachable\n-UpdateHandoff\
        \ appends a timestamped snapshot table to SESSION-HANDOFF.md.\nAcceptance: exit code 0 (all checks green).\nIf degraded:\
        \ run HK-002 to restore LDE, HK-003 to restore ELK.\n"
