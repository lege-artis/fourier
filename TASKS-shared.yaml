        \ perturbation theory,\n     Regge-Wheeler equation — needs radial ODE solver or spectral method)\n   - Future: full\
        \ nonlinear GR numerical relativity (deferred — R5+)\n2. Method selection per problem class:\n   - KH: extend existing\
        \ pseudo-spectral (higher resolution, adaptive dt)\n   - GR linearized: Chebyshev spectral collocation (1D/2D radial\
        \ problems)\n   - Hybrid: spectral for smooth fields, FEM for discontinuities\n3. Language: Fortran (performance baseline),\
