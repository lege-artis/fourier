  housekeeping:
    description: >-
      Recurring session-management procedures for ThinkPad dev sessions.
      Run HK-001 at session START and HK-004 at session CLOSE every time.
      HK-002 and HK-003 are triggered on demand when stacks are down.
    tasks:

      - id: HK-001
        title: "Session-start env probe -- run Check-SessionEnv.ps1 -Stack all"
        priority: P1-critical
        device: ThinkPad
        status: open
        tags: [housekeeping, health-check, session-start, lde, elk, mongodb, git]
        notes: |
          Run at the START of every ThinkPad session before any dev/test work.
          Command:
            .\_config\Check-SessionEnv.ps1 -Stack all -UpdateHandoff
          Checks:
            LDE stack  : kh-rust(:8001) kh-scala(:8002) kh-cpp(:8003)
                         kh-fortran(:8004) kh-pascal(:8005) plantuml(:8010)
            ELK stack  : elasticsearch(:9200) kibana(:5601) fluent-bit(:2020)
            MongoDB    : Windows service + TCP :27017
            Git state  : active branch != main, remote origin reachable
          -UpdateHandoff appends a timestamped snapshot table to SESSION-HANDOFF.md.
          Acceptance: exit code 0 (all checks green).
          If degraded: run HK-002 to restore LDE, HK-003 to restore ELK.

      - id: HK-002
        title: "LDE stack restore -- Start-LocalEnv.ps1 -Action up (ThinkPad)"
        priority: P1-critical
        device: ThinkPad
        status: open
        tags: [housekeeping, lde, docker, restore]
