# ─────────────────────────────────────────────────────────────────────────────
# PROJECT: phys-solver — classical spectral/FEM solver for physics verification
# Dual-track with PINN: classical solver provides ground truth for PINN training
# and cross-validation. Primary test cases: KH-instability + GR linearized.
# ─────────────────────────────────────────────────────────────────────────────

  phys-solver:
    description: >-
      Purpose-built classical numerical solver for the nonlinear physics framework.
      Spectral methods (extending KH pseudo-spectral approach) and/or finite-element
      methods for GR perturbation problems. Serves as verification ground truth for
      PINN training and result validation. Cross-validated against GR exact solutions
      (P&G) and KH pseudo-spectral reference (Python/NumPy).
    tasks:
      - id: SOLV-001
        title: "Classical solver architecture spec — spectral vs FEM vs hybrid, language choice"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [GR-001, KH-VAL]
        tags: [solver, architecture, spectral, fem, spec]
        notes: |
          Write docs/solver-architecture.md answering:
          1. Scope: which test cases drive design?
             - KH-instability (2D incompressible N-S, pseudo-spectral — already proven)
             - GR linearized perturbations (e.g. Schwarzschild perturbation theory,
               Regge-Wheeler equation — needs radial ODE solver or spectral method)
             - Future: full nonlinear GR numerical relativity (deferred — R5+)
          2. Method selection per problem class:
             - KH: extend existing pseudo-spectral (higher resolution, adaptive dt)
             - GR linearized: Chebyshev spectral collocation (1D/2D radial problems)
             - Hybrid: spectral for smooth fields, FEM for discontinuities
          3. Language: Fortran (performance baseline), Julia (Symbolics interop), or C++?
             Recommendation: Julia — native interop with symbolic layer (Symbolics.jl),
             DifferentialEquations.jl ecosystem, and Plots.jl for diagnostics.
          4. Interface contract: solver exposes REST /solve endpoint (mirrors KH-sim pattern)
             returning field arrays + diagnostics JSON.
          Acceptance: ADR written, language decided, first test case targeted.

      - id: SOLV-002
        title: "Classical solver — KH test case (extended pseudo-spectral, higher resolution)"
        priority: P3-medium
        device: ThinkPad
        status: deferred
        depends_on: [SOLV-001]
        tags: [solver, kh-instability, spectral, julia, verification]
        notes: |
          Implement KH-instability solver in Julia (or chosen language from SOLV-001).
          Extends the existing Python/Pascal/Fortran approach with:
            - Higher grid resolution (128×64, 256×128) for convergence testing
            - Adaptive time-stepping (embedded RK45 with error control)
            - Dealiasing filter (2/3 rule) for long-time stability
            - Output: full field snapshots at configurable intervals
          Validates against Python reference (must pass KH-VAL tightened tolerances).
          Serves as ground truth for PINN-003 training data generation.
          Acceptance: solver produces ke/enstrophy within KH-VAL tolerance at
          multiple resolutions; convergence rate confirmed (spectral accuracy).

      - id: SOLV-003
        title: "Classical solver — GR linearized perturbation (Regge-Wheeler ODE)"
        priority: P3-medium
        device: MacBook
        status: deferred
        depends_on: [SOLV-001, GR-003]
        tags: [solver, gr, regge-wheeler, spectral, chebyshev]
        notes: |
          Solve the Regge-Wheeler equation for axial gravitational perturbations
          of Schwarzschild spacetime — the canonical linearized GR test:
            d²ψ/dr*² + [ω² - V(r)] ψ = 0
          where V(r) is the Regge-Wheeler potential and r* is the tortoise coordinate.
          Method: Chebyshev spectral collocation on compactified domain.
          Cross-validates against known quasi-normal mode frequencies
          (e.g. l=2 mode: ω M ≈ 0.3737 - 0.0890i for Schwarzschild).
          Acceptance: QNM frequency within 0.1% of tabulated value (Leaver 1985).

      - id: SOLV-004
        title: "Cross-validation — PINN vs classical solver vs GR/KH analytical ground truth"
        priority: P3-medium
        device: both
        status: deferred
        depends_on: [SOLV-002, SOLV-003, PINN-003]
        tags: [solver, pinn, cross-validation, physics-framework]
        notes: |
          Systematic cross-validation study:
          1. KH track: PINN(data-driven) vs SOLV-002(spectral) vs Python-reference
             — compare ke, enstrophy, max_vorticity at t=0.1 for nx=64/128/256
          2. GR track: PINN(trained on linearized solutions) vs SOLV-003(Chebyshev)
             vs Regge-Wheeler analytical QNM (Leaver)
          3. Produce cross-validation report: agreement matrix, error budget,
             cases where PINN diverges from classical, interpretation.
          This study forms the technical core of the R4 physics framework claim.
          Output: docs/cross-validation-R4.md + plots.

      - id: SOLV-005
        title: "Solver REST interface — /solve endpoint mirroring KH-sim API pattern"
        priority: P3-medium
        device: ThinkPad
        status: deferred
        depends_on: [SOLV-002, SOLV-003]
        tags: [solver, api, rest, integration]
        notes: |
          Expose classical solver as HTTP service (port 8006) with endpoints:
            POST /solve/kh      — KH simulation (extended pseudo-spectral)
            POST /solve/rw      — Regge-Wheeler ODE (GR linearized)
            GET  /health
            GET  /info
          Request/response schema mirrors KH-sim API (diagnostics sub-object,
          field arrays, compute_ms). Integrates into React /dashboard L2 panel
          as an additional backend entry.
          Acceptance: /solve/kh response passes KH-VAL tightened tolerances;
          /solve/rw returns QNM frequency within 0.1% of Leaver value.
