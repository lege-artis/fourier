  symb-infra:
    description: Tri-layer symbolic/reasoning/log-data architecture — Julia (physics symbolic), Clojure+core.logic+Datahike
      (reasoning+Datalog), ELK bridge
    decision_confirmed: 2026-03-28
    decision_rationale: 'Architecture confirmed. Datalog is the pivot point: serves as both query language

      and logic programming substrate, eliminating impedance mismatch between ES log retrieval

      and Clojure/core.logic inference. ELK remains raw event store with a Datahike projection

      layer above it. Julia orthogonal (physics symbolic only). Scope: deeper architectural

      analysis, documentation, and test case creation per SYMB-001 ADR.

      '
    tasks:
    - id: SYMB-001
      title: Architecture decision record — tri-layer symbolic/reasoning/data design
      priority: P2-high
      device: both
      status: done
      tags:
      - architecture
      - adr
      - julia
      - clojure
      - datalog
      - symbolic
      - reasoning
      notes: "Done 2026-04-04. ADR written: infra/SYMB-ARCHITECTURE.md (v1.0.0)\nFive decisions recorded:\n  1. Julia as physics\
        \ symbolic layer boundary (Symbolics.jl, ModelingToolkit.jl,\n     AD of PDE residuals; Python/PINN retains numerical\
        \ execution).\n  2. Clojure as reasoning layer: core.logic (miniKanren) for inference rules,\n     Datahike (Datalog)\
        \ for structured queries; JVM alongside Scala.\n  3. Log data bridge: ELK raw events → Datahike ETL projection → Datalog\
        \ query\n     interface. Datalog as pivot point for unified L2 query vocabulary.\n  4. Inter-layer contracts: Julia\
        \ REST sidecar (port 8601) ↔ Python; direct JVM\n     interop for Clojure ↔ Scala; REST for Julia ↔ Clojure. Contract\
        \ tests spec'd.\n  5. Port allocation: Julia symb 8601, Clojure reasoning 8700, ETL bridge 8701.\nGate: SYMB-002 through\
        \ SYMB-005 now unblocked.\n"
