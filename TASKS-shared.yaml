    - id: KH-VAL
      title: Validation hardening — tighten tolerances + physics-framework boilerplate test base
      priority: P3-medium
      device: both
      status: deferred
      depends_on:
      - KH-018
      tags:
      - testing
      - validation
      - physics-framework
      - boilerplate
      notes: "Deferred until physics framework boilerplate milestone.\nCurrent per-backend tests pass at 0.00% error — insufficient\
        \ discriminating power because\nall backends implement identical Cooley-Tukey+RK4 in IEEE-754 double, masking subtle\
        \ bugs.\nRequired hardening (applies uniformly to all backends via shared test harness):\n  1. Tighten KE/enstrophy\
        \ tolerance: 5% → 0.1%; div_rms: 1e-10 → 1e-12.\n  2. Grid sensitivity: add 128×64 case (aliasing bugs cancel at 64×32).\n\
        \  3. Re sensitivity: Re=100 (viscous-dominated) and Re=10000 (inertia-dominated).\n  4. Longer integration: 500 steps\
        \ (exposes RK4 stage sign errors via error accumulation).\n  5. Cross-backend parity: all 5 backends at same params\
        \ — compare outputs to each other\n     (not only vs Python reference). Backend divergence > 0.01% at step 500 = failure.\n\
        \  6. Conservation check: assert enstrophy[t+1] <= enstrophy[t] for Re < 500 (catches\n     sign errors in diffusion\
        \ term that 64×32/100-step reference cannot detect).\n  7. Format fix: report err in scientific notation when err\
        \ < 0.01% to avoid \"0.00%\" masking.\nImplement as shared pytest harness (kh-sim/tests/validation/) calling each\
        \ backend's\nHTTP /simulate endpoint — language-agnostic, single source of truth.\n"
