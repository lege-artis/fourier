        priority: P2-high
        device: MacBook
        status: pending
        depends_on: [MI-M-T-D02]
        tags: [mi-m-t, jira, integration, R3]
        notes: |
          Bidirectional JIRA interface for MI-M-T testing tool:
            - Read JIRA issues/stories/acceptance criteria into MI-M-T test object model
            - Map JIRA issue status to MI-M-T lifecycle (defined/executing/passed/failed)
