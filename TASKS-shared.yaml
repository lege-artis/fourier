  gr-testcases:
    description: Normative GR exact-solution test cases drawn from Podolský & Griffiths (Cambridge 2009). Each task corresponds
      to a solution family from the book and specifies what the symbolic layer must derive and what the reasoning layer must
      assert.
    tasks:
    - id: GR-001
      title: 'ADR — GR test-case framework: scope, solution families, acceptance criteria'
      priority: P3-medium
      device: both
      status: deferred
      depends_on:
      - SYMB-001
      tags:
      - gr
      - architecture
      - adr
      - physics-framework
      notes: "Write the Architecture Decision Record that answers:\n  1. Which solution families from Podolský & Griffiths\
        \ are in scope for\n     the first milestone (suggested: Minkowski, Schwarzschild,\n     Reissner-Nordström, pp-waves,\
        \ Kerr — Chapters 3/9/12/17/13).\n  2. What the Julia symbolic layer must produce for each (metric tensor,\n     Christoffel\
        \ symbols Γ^μ_νρ, Ricci scalar R, Weyl tensor Cμνρσ,\n     Petrov classification).\n  3. Acceptance tolerance: symbolic\
        \ results are exact (no floating-point\n     error), so the test is Boolean (derived == book expression).\n  4. How\
        \ Clojure reasoning rules encode physical constraints\n     (vacuum ⟹ Rμν=0, Petrov type D ⟹ Ψ0=Ψ1=Ψ3=Ψ4=0, etc.).\n\
        \  5. Integration with KH-VAL boilerplate milestone.\nReference: P&G ISBN 978-0-521-88927-8, front-matter PDF available\
        \ at\nhttps://assets.cambridge.org/97805218/89278/frontmatter/9780521889278_frontmatter.pdf\n"
    - id: GR-002
      title: 'GR test case — Minkowski space (P&G §3): symbolic baseline'
      priority: P3-medium
      device: both
      status: deferred
      depends_on:
      - GR-001
      tags:
      - gr
      - minkowski
      - symbolic
      - julia
      - baseline
      notes: 'Simplest possible GR solution — flat spacetime.

        Julia must derive: gμν = diag(-1,1,1,1), Γ^μ_νρ = 0 everywhere,

        Rμνρσ = 0, R = 0, Weyl = 0, Petrov type O.

        Serves as the smoke test / "hello world" for the GR symbolic pipeline.

        '
    - id: GR-003
      title: 'GR test case — Schwarzschild vacuum (P&G §9): symbolic + Petrov type D'
      priority: P3-medium
      device: both
      status: deferred
      depends_on:
      - GR-001
      tags:
      - gr
      - schwarzschild
      - vacuum
      - symbolic
      - julia
      - petrov
      notes: "Static spherically symmetric vacuum solution. Canonical test for:\n  - Symbolic derivation of Schwarzschild\
        \ metric in Schwarzschild coords\n  - Verification Rμν = 0 (vacuum Einstein equations)\n  - Weyl tensor non-zero;\
        \ Petrov type D (Ψ0=Ψ1=Ψ3=Ψ4=0, Ψ2≠0)\n  - Clojure rule: \"Schwarzschild ∧ outside_horizon ⟹ vacuum ∧ type_D\"\n"
    - id: GR-004
