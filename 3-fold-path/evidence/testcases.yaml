schema_version: "2.0.0"
# testcases.yaml — MI-M-T PoC manual test suite
# Seeded:  2026-04-16 (MI-M-T-P03)
# Updated: 2026-04-17 — TC-001/TC-002 verified; CPT slug corrected; TC-006 expected updated
#          2026-04-24 — TC-009/010/011 added (BUG-018 podcast player regression)
#          2026-05-03 — v2 migration (PoC-01): test_target_ref + requirement_ref added per
#                       MI-M-T-D08-TDD-SPEC.md §8 mapping table (extended for actual IDs)
# Coverage: all severity-A bugs + key severity-B bugs
# Convention: TC-0xx = zemla, TC-1xx = mim2000, TC-2xx = bodyterapie, TC-9xx = cross-site
#
# v2 schema delta (per D08-TDD-SPEC §3.3):
#   test_target_ref: TT-NNN   — links case to scoped test surface (test-targets.yaml)
#   requirement_ref: REQ-NNN  — links case to acceptance criterion (requirements.yaml)
#   Both fields REQUIRED in v2; triage.py --orphan-cases must return 0 results.
#
# TT-016..TT-019 and REQ-018..REQ-024 extend the D08-TDD-SPEC §7/§6 seed to cover
# the 18 actual TCs (vs the 15 assumed in the spec's mapping table).

testcases:

  # ──────────────────────────────────────────
  # zemla.org — Podcast (BUG-003, BUG-004)
  # ──────────────────────────────────────────

  - id: TC-001
    title: "Podcast episode single: featured image renders at correct size"
    type: manual
    component: podcast
    site: [zemla]
    test_target_ref: TT-006
    requirement_ref: REQ-008
    precondition: "At least one zemla_episode post exists with featured image (CPT slug: zemla_episode — NOT podcast_episode)"
    status: verified
    last_verified: "2026-04-17"
    verified_in: "v1.6.7"
    steps:
      - action: "Navigate to a podcast episode single page (e.g. /podcast/suche-kosti-ep00/)"
        expected: "Page loads without errors"
      - action: "Inspect the featured image element"
        expected: "Image renders at max 200×200 px, floated right alongside episode title; title text wraps left"
      - action: "Check image is not full-width or oversized"
        expected: "Image does not exceed 200px width; no layout overflow"
      - action: "Inspect .zp-player position"
        expected: "Player starts below the float (clearfix working) — not alongside cover art"
      - action: "Resize to 375px mobile"
        expected: "Cover stacks full-width above content (float cancelled by media query)"
    severity_if_fail: A
    verifies_bugs: [BUG-003]
    traces_to: [Z-15]
    automated_script: ~

  - id: TC-002
    title: "Podcast episode single: custom audio player present with controls"
    type: manual
    component: podcast
    site: [zemla]
    test_target_ref: TT-005
    requirement_ref: REQ-005
    precondition: "zemla_episode post has audio file attached (data-src on .zp-player)"
    status: verified
    last_verified: "2026-04-17"
    verified_in: "v1.6.8"
    steps:
      - action: "Navigate to a podcast episode single page"
        expected: "Custom .zp-player visible (NOT native HTML5 <audio controls>)"
      - action: "Check duration displayed at rest before play"
        expected: "Duration shows correct total time (e.g. '48:28'), not '0:00'"
      - action: "Click play button"
        expected: "Icon changes to pause; audio plays"
      - action: "Check player has speed control"
        expected: "Speed button cycles 1× → 1.5× → 2× → 1×; audio rate changes accordingly"
      - action: "Check skip buttons"
        expected: "−30s and +30s skip buttons present and seek audio correctly"
      - action: "Click on progress bar"
        expected: "Audio seeks to clicked position; fill updates; time display updates"
      - action: "Open DevTools Console"
        expected: "Zero JS errors"
      - action: "Resize to 375px mobile"
        expected: "Player renders within viewport bounds; no horizontal overflow"
    severity_if_fail: A
    verifies_bugs: [BUG-004]
    traces_to: [Z-16]
    automated_script: ~

