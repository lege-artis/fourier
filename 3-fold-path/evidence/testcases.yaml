  # ──────────────────────────────────────────
  # zemla.org — Podcast player regression (BUG-018)
  # ──────────────────────────────────────────

  - id: TC-009
    title: "Podcast episode: cover art absent from episode page body (not rendered, not stacked)"
    type: manual
    component: podcast/template
    site: [zemla]
    test_target_ref: TT-006
    requirement_ref: REQ-008
    precondition: "zemla_episode post exists with featured image. HOTFIX-ZP-001 applied."
    steps:
      - action: "Navigate to a podcast episode single page (e.g. /podcast/suche-kosti-ep00/)"
        expected: "Page loads without PHP errors"
      - action: "Inspect the episode page body above the .zp-player"
        expected: "No featured image visible in body. No grey placeholder, no stacked image art. Image suppressed via CSS display:none on .single-zemla_episode .wp-post-image."
      - action: "Verify no layout gap or blank space where image used to appear"
        expected: "Layout flows directly from episode title to player with no empty block"
      - action: "Inspect via DevTools: .single-zemla_episode .wp-post-image"
        expected: "Element exists in DOM but has computed display: none"
    severity_if_fail: B
    verifies_bugs: [BUG-018]
    notes: "Tests sub-symptom (a) of BUG-018. Image suppressed by design decision, not floated."
    automated_script: ~

  - id: TC-010
    title: "Podcast player: 1× speed plays at real-time rate (no acceleration)"
    type: manual
    component: podcast/player
    site: [zemla]
    test_target_ref: TT-005
    requirement_ref: REQ-006
    precondition: "Episode page loaded. HOTFIX-ZP-001 applied. Audio can be played."
    steps:
      - action: "Navigate to a podcast episode page. Start playback."
        expected: "Audio plays, .zp-time counter begins incrementing"
      - action: "Note wall-clock time (phone/stopwatch). Play for exactly 30 seconds wall-clock."
        expected: "Player time counter shows 30 s elapsed (±1 s tolerance)"
      - action: "Verify speed badge shows '1×'"
        expected: "Speed badge displays '1×'"
      - action: "Open DevTools console. Run: document.querySelector('audio').playbackRate"
        expected: "Returns 1 (not 1.5, 2, or any other value)"
      - action: "Toggle speed to 1.5× then back to 1×. Repeat timing check for 10 s wall-clock."
        expected: "After return to 1×, 10 s wall-clock = 10 s player time (±0.5 s)"
    severity_if_fail: A
    verifies_bugs: [BUG-018]
    notes: "Tests sub-symptom (b) of BUG-018. Regression: 1× was playing faster than real-time post v1.6.8."
    automated_script: ~

  - id: TC-011
    title: "Podcast player: skip and speed controls do not restart track"
    type: manual
    component: podcast/player
    site: [zemla]
    test_target_ref: TT-005
    requirement_ref: REQ-007
    precondition: "Episode page loaded. HOTFIX-ZP-001 applied. Track has duration > 2 min."
    steps:
      - action: "Start playback. Let track play to at least 1:00 (one minute elapsed)."
        expected: "Player time shows ~1:00"
      - action: "Click skip-back (−30 s) button."
        expected: "Player time jumps back 30 s (to ~0:30). Track does NOT restart from 0:00. Playback continues from new position without interruption."
      - action: "Let track reach 1:30. Click skip-forward (+30 s) button."
        expected: "Player time jumps forward 30 s (to ~2:00). Track does NOT restart from 0:00. Playback continues from new position."
      - action: "Let track reach 2:00. Click speed toggle (1× → 1.5×)."
        expected: "Speed badge changes to '1.5×'. Audio continues from current position at higher rate. Track does NOT restart."
      - action: "Click speed toggle again (1.5× → 2×), then again (2× → 1×)."
        expected: "Each toggle changes speed only. No track restart. currentTime preserved across all transitions."
      - action: "Verify via DevTools: document.querySelector('audio').currentTime after each action"
        expected: "currentTime reflects expected position (skip ±2 s tolerance, speed toggle 0 s delta)"
    severity_if_fail: A
    verifies_bugs: [BUG-018]
    notes: |
      Tests sub-symptoms (c) and (d) of BUG-018.
      Regression: both skip and speed toggle caused track restart from 0:00 post v1.6.8.
      Root cause suspected: audio.load() or audio.src reset in event handlers.
    automated_script: ~

