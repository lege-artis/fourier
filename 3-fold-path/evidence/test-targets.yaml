test_targets:

  # ── Identity / configuration ────────────────────────────────────────────────

  - id: TT-001
    title: "inc/zemla-config.php — master identity data file"
    description: |
      The shared configuration PHP file containing all identity constants:
      ZEMLA_LINKEDIN_URL, ZEMLA_SLUG_* nav constants, ZEMLA_AUTHOR_NAME, site URLs.
      All three themes (zemla, mim2000, bodyterapie) include this file.
      Test surface: file contents, defined constants, no hard-coding elsewhere.
    type: component
    site: cross-site
    component: identity
    requirement_refs: [REQ-001, REQ-017]
    implementation_ref: "inc/zemla-config.php"
    status: active

  # ── Gallery ─────────────────────────────────────────────────────────────────

  - id: TT-002
    title: ".gallery-layout DOM structure — sidebar wrapper two-child pattern"
    description: |
      The gallery page container must have exactly two direct children:
      <aside class="gallery-sidebar"> and an element with class .album-grid.
      CSS grid-template-columns: 220px 1fr is the enforced layout.
      Test surface: rendered DOM structure on any gallery page.
    type: component
    site: cross-site
    component: gallery
    requirement_refs: [REQ-002]
    implementation_ref: "page-templates/page-gallery.php"
    status: active

  - id: TT-003
    title: "Album card — vertical layout, 3:2 aspect ratio, image-top"
    description: |
      Individual album cards must render with image at top (3:2 hard-cropped),
      title and description text below. Flex-direction: column enforced.
      Test surface: album card CSS rendering on gallery and archive pages.
    type: component
    site: cross-site
    component: gallery
    requirement_refs: [REQ-003]
    implementation_ref: "assets/css/gallery.css"
    status: active

  # ── Translation ──────────────────────────────────────────────────────────────

  - id: TT-004
    title: "inc/translations.php — completeness gate for all _e() calls"
    description: |
      The translation lookup table must contain entries for every string
      used via _e() or __() in theme PHP files, covering all 5 locales
      (CS, EN, JA, DE, IT). The release test §4 grep command is the
      authoritative check.
    type: component
    site: zemla
    component: translation
    requirement_refs: [REQ-004, REQ-016]
    implementation_ref: "inc/translations.php"
    status: active

  # ── Podcast player ───────────────────────────────────────────────────────────

  - id: TT-005
    title: "zp-engine.js — podcast player: init, speed control, seek behaviour"
    description: |
      The JavaScript podcast player engine. Test surfaces:
      - Single-init guard (no double-init on episode pages)
      - Speed control: selected rate persists across seek/skip
      - Skip forward/back: relative seek, no track restart
      Player DOM: .zp-player[data-src] → .zp-play, .zp-progress-wrap,
      .zp-time, .zp-speed, .zp-download.
    type: component
    site: zemla
    component: podcast
    requirement_refs: [REQ-005, REQ-006, REQ-007]
    implementation_ref: "assets/js/zp-engine.js"
    status: active

  - id: TT-006
    title: "Single episode page — cover art render at zemla-wide (512×512)"
    description: |
      The featured image on single-zemla_episode post type pages.
      Must be served at zemla-wide size (512×512 hard-cropped) and
      render at full dimensions (no collapsed container).
      CPT slug: zemla_episode. Post ID 530 used as reference.
    type: page
    site: zemla
    component: podcast
    requirement_refs: [REQ-008]
    implementation_ref: "single-zemla_episode.php"
    status: active

