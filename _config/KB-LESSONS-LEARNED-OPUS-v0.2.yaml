# ── Python / dev tooling ──────────────────────────────────────────────────────
python_dev:

  - id: PYDEV-001
    rule: "After editing a .py file via Windows path (Edit tool), touch it from Linux shell before running"
    rationale: |
      The CoWork sandbox mounts the Windows filesystem via FUSE. When a file is edited through
      the Windows path (Edit tool), the Linux-side mtime may not update. Python uses mtime embedded
      in .pyc to decide whether to recompile; if .pyc mtime > .py mtime, the stale cache is used
      silently. Fix: run 'touch /sessions/.../mnt/path/to/file.py' immediately after editing.
    symptoms:
      - Edit tool reports success but code change has no effect at runtime
      - .pyc mtime is newer than .py mtime (check with 'ls -la __pycache__/*.pyc' vs the .py)
      - inspect.getsource() raises OSError (getsource resolves .pyc, not .py)
    fix: "touch <linux_mount_path>/<file>.py  # forces mtime update → Python recompiles"
    discovered: "2026-04-26 — MI-M-T-D03 FilterSpec filter bug; single failing assertion masked by stale JiraAdapter pyc"

  - id: PYDEV-002
    rule: "Cannot delete .pyc files from __pycache__ in the Linux sandbox (EPERM)"
    rationale: |
      __pycache__/*.pyc files created under the Windows NTFS mount are not deletable from the
      Linux sandbox (Operation not permitted). Use 'touch' on the .py source instead of trying
      to clear the cache.
    fix: "touch <file>.py  — do not attempt rm on .pyc files"
    discovered: "2026-04-26 — attempted 'find ... -name *.pyc -delete' returned EPERM on all cache files"

- id: KB-030
  date: 2026-04-30
  project: mi-m-t
  component: python-fastapi
  category: sqlalchemy
  title: "SQLAlchemy 2.x autobegin: session.begin() must be first op on session"
  symptom: "InvalidRequestError raised at async with session.begin() when a prior SELECT or execute() on the same session already triggered autobegin."
  root_cause: |
    SQLAlchemy 2.x AsyncSession uses autobegin=True by default. Any database
    operation (SELECT, execute) on the session starts an implicit autobegin
    transaction. Calling session.begin() after autobegin is active raises
    InvalidRequestError: "A transaction is already begun on this Session."
    Typical pattern: router does svc.get(id) for 404 check, then calls a
    write service method that wraps DML in async with db.begin() — FAIL.
  fix: |
    Two patterns, never mix within the same session instance:
    (A) FIRST-OP pattern: async with db.begin() is only valid as the FIRST
        operation on a fresh session (create() methods where no SELECT precedes).
    (B) AUTOBEGIN pattern: after any SELECT on the session, execute all DML
        directly (no begin() wrapper). get_db dependency commits the autobegin
        transaction at request boundary via await session.commit().
    For write methods that need a prior existence check, either:
      - Do the SELECT inside the begin() block before any DML, OR
      - Remove the pre-check from the router and rely on FK constraints, OR
      - Use self.db.execute(text(...)) without a begin() wrapper.
  prevention: |
    Document the rule in all service docstrings.
    Code review gate: any async with db.begin() call must have no prior
    db.execute() or ORM query on the same session instance in the same request.
  references:
    - 3-fold-path/code/mi_m_t/mi_m_t/services/test_runs.py
    - 3-fold-path/code/SESSION-NOTES.md (D-08 section)
  tags: [sqlalchemy, async, transaction, autobegin, fastapi, python]

- id: KB-031
  date: 2026-04-30
  project: mi-m-t
  component: python-fastapi
  category: httpx
  title: "httpx >= 0.23: use ASGITransport instead of app= keyword arg"
  symptom: "TypeError: AsyncClient.__init__() got an unexpected keyword argument 'app'"
  root_cause: "httpx 0.23+ removed the app= shortcut for ASGI apps; the API changed to transport=httpx.ASGITransport(app=app)."
  fix: "async with httpx.AsyncClient(transport=httpx.ASGITransport(app=app), base_url=...) as c:"
  prevention: "Use transport= pattern in all in-process FastAPI test harnesses."
  tags: [httpx, asgi, testing, fastapi]

- id: KB-032
  date: 2026-04-30
  project: mi-m-t
  component: python-fastapi
  category: smoke-test
  title: "Smoke test idempotency: use timestamped item codes to avoid UNIQUE constraint replay"
  symptom: "IntegrityError: UNIQUE constraint failed on re-run of smoke test against persistent DB."
  root_cause: "Smoke test used static item codes (SMK9, TT-S9-001, etc.). Second run hits UNIQUE(project_id, item_code)."
  fix: "Suffix all item codes with a timestamp tag: RUN_TAG = datetime.utcnow().strftime('%H%M%S')."
  prevention: "Any smoke/integration test that writes to a persistent DB must use unique-per-run identifiers."
  tags: [testing, smoke-test, sqlite, unique-constraint]

- id: KB-033
  date: 2026-04-30
  project: meta
  component: session-lifecycle
  category: workflow
  title: "Session lifecycle SOP — 5-phase mandatory gate between Claude sessions"
  description: |
    Established SESSION-LIFECYCLE-SOP.md as the canonical workflow:
    Phase 1: GitHub session restart (critical revision gate — read HANDOFF BLOCK, audit commits, check MANIFEST)
    Phase 2: Daily automated smoke test + email notification (MI-M-T + WP ping) — FAIL blocks feature work
    Phase 3: MacBook sync + GitHub artifact push (TASKS-shared, MANIFEST, queue-macbook, CLAUDE.md, commit+push)
    Phase 4: Session artifact review, SESSION-NOTES close section, KB update, cleanup
    Phase 5: Prepare Claude version update restart — HANDOFF BLOCK in CLAUDE.md, freeze state, commit
  rationale: |
    Sessions were accumulating undocumented state and stale registry files.
    Without a mandatory gate, new sessions started from incorrect state (wrong versions,
    stale CURRENT STATE block, uncommitted artifacts). The 5-phase SOP enforces clean
    handoff between sessions and Claude version updates.
  artifacts:
    - _config/SESSION-LIFECYCLE-SOP.md
    - _config/SESSION-RESTART-CHECKLIST.md
    - _config/daily-smoke-runner.sh
  tags: [session, lifecycle, sop, workflow, restart, smoke-test]

- id: KB-034
  date: 2026-05-02
  project: meta
  component: git-workflow
  category: workflow
  title: "ThinkPad force-pushed macbook branch — authority violation pattern"
  description: |
    During 2026-05-02 session, ThinkPad force-pushed origin/macbook
    (+ 2eb73f3...1364eb8 forced update). This reverted queue-macbook.yaml
    to a prior state, erasing the Session 2026-05-02 done entries and the
    DESIGN-BT-01/DESIGN-MIM-01/MI-M-T-D08 pending block.
    The macbook branch is MacBook authority per .gitattributes (merge=ours on
    queue-macbook.yaml). Force-push from ThinkPad bypasses this entirely.
    Subsequent git pull --rebase surfaced conflicts in ci-heartbeat.yml and
    App.css (both devices independently fixed the same bugs). Resolved by
    taking ThinkPad's superior fixes (sbt/setup-sbt@v1, fpc without -o flag).
  root_cause: "ThinkPad has push rights to macbook branch — no branch protection rule enforced."
  fix: |
    1. Restored queue-macbook.yaml to correct state manually post-rebase.
    2. Added note to meta.current_session documenting the violation.
    3. Recommendation: add branch protection rule on GitHub — require PR or
       restrict direct push to macbook branch to MacBook identity only.
  prevention: |
    - Enable GitHub branch protection: Settings → Branches → Add rule → macbook
      → "Restrict pushes that create matching branches" (or require PR review)
    - ThinkPad should push to thinkpad branch only; cross-branch merges via PR.
    - .gitattributes merge=ours is a merge strategy hint, not a push guard.
  tags: [git, branch-protection, authority, force-push, macbook, thinkpad, workflow]

- id: KB-035
  date: 2026-05-02
  project: meta
  component: ci
  category: toolchain
  title: "CI concurrent conflict pattern — two devices independently fix same CI failures"
  description: |
    MacBook and ThinkPad both diagnosed and fixed the same ci-heartbeat.yml failures
    in the same session (2026-05-02), producing conflicting commits:
    - Scala SBT: MacBook added apt GPG repo manually; ThinkPad used sbt/setup-sbt@v1 action.
    - Pascal fpc: MacBook added -o hello_test flag; ThinkPad omitted -o entirely.
    - App.css: both created the file independently.
    ThinkPad's fixes were architecturally superior in both cases.
  resolution: "Took ThinkPad's version for all three conflicts during git rebase."
  lesson: |
    When two devices are active simultaneously on the same CI workflow file,
    coordinate via TASKS-shared.yaml before both starting diagnosis. The first
    device to commit should note the fix in the task registry so the second
    device skips duplicate work.
  tags: [ci, conflict, concurrent-edit, scala, pascal, react, workflow]

- id: KB-036
  date: 2026-05-09
  project: portfolio
  component: session_protocol
  category: governance
  title: "Workspace-survey rule — always check VibeCodeProjects parent before inventing portfolio governance"
  description: |
    During CP-SUPIN-05 work, an Opus session authored PORTFOLIO-META-v0.1-EN.md (~600 lines)
    proposing portfolio-level governance conventions: device placement matrix, Sonnet
    orchestration patterns, six-map taxonomy, Gate-with-Window catalogue, R-COVERAGE-ZERO
    methodology rule, Apache 2.0 + CC-BY-SA-4.0 license stack, shibboleth aesthetic principle.
    Significant fraction of that content duplicated existing infrastructure already living
    at the VibeCodeProjects root level: CLAUDE.md (entry doc + load order), MANIFEST.yaml,
    TASKS-shared.yaml, queue-thinkpad.yaml, queue-macbook.yaml, OPUS-CYCLE-v0.2-MASTER.md
    (covers strategic framing, three deployment modes, conceptual triple, three pilot
    tracks), SESSION-LIFECYCLE-SOP.md (5-phase cycle), HANDOVER-V0.2-MACBOOK.md +
    HANDOVER-V0.2-THINKPAD.md (Sonnet handoff prompts), KB-LESSONS-LEARNED.yaml
    (cross-project KB), DEVICES.md (device matrix), GITHUB-ORCH-V0.2.md (parallel-sync
    protocol), PROJECT-CLOSING-HOWTO.md, plus 30+ governance docs in _config/.
    Root cause: workspace mount was scoped to SUPIN/ only when session began; Opus
    session inferred portfolio state from session-close docs accumulated inside SUPIN
    folder rather than checking the parent. Specific factual errors that resulted:
    misidentified "3-fold-path" as Fortran/C++/Rust language tracks (actual: Mind/Spirit/
    Body trinity = three WordPress sites zemla.org/mim2000.cz/bodyterapie.com); used
    generic "MI-M-T" without knowing the corrected expansion (Meta Informed/Inferred/
    Integrated Measurement-which-do-Testing per OPUS-CYCLE §1.1, "Manual" word
    explicitly wrong); didn't know kh-sim, mim2000, bodyterapie, MI-M-T FastAPI service
    are all actively shipped; reinvented the 6-element-chain algebra as "Round Zero
    coverage" without recognising it was already the canonical traceability chain.
  resolution: |
    Workspace mount expanded via mcp__cowork__request_cowork_directory to
    C:\Users\vitez\Documents\VibeCodeProjects parent folder; existing infrastructure
    surveyed; PORTFOLIO-META v0.1 retired to archive/obsolete/ with superseded note;
    salvageable content (lege-artis org confirmation, Fourier-as-new-track positioning,
    R-COVERAGE-ZERO label for the existing 6-element-chain algebra) extracted into
    additive CLAUDE-MD-DELTA-2026-05-09.md for review and merge into canonical CLAUDE.md.
  lesson: |
    Every Opus and Sonnet session — whether on ThinkPad, MacBook, or any future device —
    MUST survey C:\Users\vitez\Documents\VibeCodeProjects (parent of all projects) at
    session start when:
      (a) any structural / governance / portfolio-level decision is being considered,
      (b) any uncertainty arises about whether existing infrastructure addresses a
          question that seems novel,
      (c) authoring any cross-project document (governance, methodology, conventions),
      (d) starting work on a project whose folder context-only makes the project look
          standalone when it is actually part of a tightly integrated portfolio.
    Read order at minimum: CLAUDE.md → MANIFEST.yaml → _config/SESSION-LIFECYCLE-SOP.md
    → _config/OPUS-CYCLE-v0.2-MASTER.md (or current cycle master) → KB-LESSONS-LEARNED.yaml
    → _config/DEVICES.md → relevant project session-close doc.
    Failure mode: reinventing existing infrastructure, propagating wrong terminology,
    proposing structural changes that conflict with active conventions.
  prevention: |
    - Add R-WORKSPACE-SURVEY-1 to CLAUDE.md as binding rule referenced from load order.
    - Sonnet handoff prompts (HANDOVER-V0.2-*) MUST include workspace-survey step in
      pre-read list — not just project-specific files.
    - When Cowork session opens with a sub-folder mount (e.g. only SUPIN/), the FIRST
      action is to request mount expansion to VibeCodeProjects parent before any work
      that touches portfolio-level concepts.
    - The mcp__cowork__request_cowork_directory tool exists for exactly this purpose;
      use it without asking when the survey is needed (the user grants in UI).
    - GitHub mirror after every CLAUDE.md / KB-LESSONS-LEARNED edit so MacBook / future
      devices pull the latest workspace-survey rule via standard sync protocol.
  rule_id: R-WORKSPACE-SURVEY-1
  applies_to: [opus_sessions, sonnet_sessions, all_devices]
  tags: [workspace, mount, governance, portfolio, sonnet-handoff, lessons-learned, opus-cycle]
