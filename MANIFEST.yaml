# ── MI-M-T strategic context ─────────────────────────────────────────────────
mi_m_t:
  full_name: "MI-M-T — Methodology for Integrated Manual Testing"
  status: "prototype — interface contracts defined (2026-04-26)"
  spec: "3-fold-path/backlog/MI-M-T-POC-PROPOSAL.md"

  positioning: |
    MI-M-T is a standalone testing methodology solution built on its own
    infrastructure (databases + connectors). It is designed to coexist with
    JIRA / Atlassian stack and Postman — not replace them. The value proposition
    is stronger, richer handling of testing artefacts: structured test object
    model (bugs.yaml + testcases.yaml + testruns/), traceability chains,
    severity×priority matrices, component-scoped evidence, and reproducible
    testrun reports. These capabilities motivate using MI-M-T in parallel with
    an existing JIRA instance rather than abandoning either tool.

  coexistence_model:
    principle: "JIRA owns issue tracking and project structure; MI-M-T owns test design and execution evidence."
    sync_direction: "full bidirectional"
    sync_cost_goal: "cheap — sync should be a single CLI call or automated webhook trigger, not a manual data-entry task"
    entity_authority:
      issues_bugs:      "bidirectional — JIRA owns metadata (assignee, fix-version, labels); MI-M-T owns test steps, expected/actual, evidence paths"
      epics_sprints:    "import from JIRA — JIRA is authoritative for project structure; MI-M-T maps to components and testrun batches"
      test_cases:       "MI-M-T primary — test design lives in testcases.yaml; JIRA/Zephyr gets a read-only pushed copy"
      attachments:      "bidirectional — evidence produced in MI-M-T (screenshots, logs) can be pushed to JIRA attachments"
    conflict_resolution: "last-write-wins per field; MI-M-T fields (test steps, expected results, evidence) always authoritative on MI-M-T side; JIRA fields (status, assignee, fix-version) always authoritative on JIRA side"

  ecosystem_interfaces:
    jira:
      contract: "3-fold-path/backlog/MI-M-T-D03-JIRA-CONTRACT.md"
      api: "JIRA Cloud REST API v3"
      auth: "Basic (email + API token) or OAuth 2.0 three-legged"
      entities: [issues, subtasks, epics, sprints, test_cases_zephyr, attachments, comments]
      migration_sources: [jira_cloud, azure_devops]
      task: MI-M-T-D03
    postman:
      contract: "3-fold-path/backlog/MI-M-T-D04-POSTMAN-CONTRACT.md"
      api: "Postman API v10 + Newman CLI"
      entities: [collections, environments, test_results]
      task: MI-M-T-D04

  migration_path: |
    When a team wants to move from JIRA Cloud or Azure DevOps to MI-M-T as primary:
    1. Run mi-m-t sync --import --source jira|ado  (pulls all issues, epics, test artefacts)
    2. MI-M-T maps incoming entities to bugs.yaml + testcases.yaml schema
    3. Historical runs imported as closed testruns with source: jira|ado tag
    4. JIRA instance can remain active in read-only / archive mode
    5. Ongoing sync cost: webhook-triggered delta sync on issue change events

  motivation_for_parallel_use:
    - "Structured test steps with explicit expected/actual fields — JIRA issues rarely enforce this"
    - "Severity × priority matrix with triage CLI — faster daily QA prioritisation"
    - "Component-scoped testrun reports exportable to MkDocs — living test documentation"
    - "Traceability chains: bug → testcase → testrun → evidence file — end-to-end audit trail"
    - "Cheap sync means no duplication penalty — work in MI-M-T, JIRA stays current automatically"
    - "Migration safety net — full data portability means no vendor lock-in"

